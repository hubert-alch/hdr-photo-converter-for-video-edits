name: Release macOS App

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0"
        required: false
        default: "0.1.0"

permissions:
  contents: write

jobs:
  package:
    name: Package macOS app
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import Developer ID certificate
        shell: bash
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${DEVELOPER_ID_CERTIFICATE_BASE64:-}" ]]; then
            echo "Developer ID certificate secret not configured; package script will use ad-hoc signing."
            exit 0
          fi

          keychain_password="${KEYCHAIN_PASSWORD:-$(uuidgen)}"
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version || '' }}" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="0.1.0"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build release package
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          NOTARIZE: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID != '' && secrets.APPLE_NOTARIZATION_PASSWORD != '' && '1' || '0' }}
          APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID || 'WP5P2JDX6U' }}
        run: zsh scripts/package-release.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hdr-photo-converter-${{ steps.version.outputs.version }}-macos
          path: |
            build/release/*.zip
            build/release/*.dmg
          if-no-files-found: error

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/release/*.zip
            build/release/*.dmg
          generate_release_notes: true
