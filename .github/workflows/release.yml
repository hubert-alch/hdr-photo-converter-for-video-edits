name: Release macOS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Package macOS app
    runs-on: macos-15
    environment: release

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import Developer ID certificate
        shell: bash
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${DEVELOPER_ID_CERTIFICATE_BASE64:-}" || -z "${DEVELOPER_ID_CERTIFICATE_PASSWORD:-}" || -z "${APPLE_API_KEY_BASE64:-}" || -z "${APPLE_API_KEY_ID:-}" || -z "${APPLE_API_ISSUER_ID:-}" || -z "${APPLE_TEAM_ID:-}" ]]; then
            echo "Developer ID and App Store Connect team API key secrets are required for a release." >&2
            exit 1
          fi

          keychain_password="$(uuidgen)"
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" -t cert -f pkcs12 -k "$keychain_path" -T /usr/bin/codesign
          security list-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          signing_identity="$(security find-identity -v -p codesigning "$keychain_path" | awk -F '"' '/Developer ID Application: FORLOVE GAME LIMITED \(WP5P2JDX6U\)/ { print $2; exit }')"
          if [[ -z "$signing_identity" ]]; then
            echo "Required Developer ID signing identity was not imported." >&2
            exit 1
          fi

          echo "TEMP_CERTIFICATE_PATH=$certificate_path" >> "$GITHUB_ENV"
          echo "TEMP_KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build release package
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          REQUIRE_DISTRIBUTION_SIGNING: "1"
          NOTARIZE: "1"
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: zsh scripts/package-release.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: hdr-photo-converter-${{ steps.version.outputs.version }}-macos
          path: |
            build/release/*.zip
            build/release/*.dmg
          if-no-files-found: error

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" build/release/*.zip build/release/*.dmg --generate-notes

      - name: Remove temporary signing material
        if: always()
        shell: bash
        run: |
          rm -f "${TEMP_CERTIFICATE_PATH:-}"
          if [[ -n "${TEMP_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$TEMP_KEYCHAIN_PATH" || true
          fi
